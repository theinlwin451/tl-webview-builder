Name: Build Android Release

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Install Dependencies
        # tl-webview-builder folder ထဲဝင်ပြီး install လုပ်ခိုင်းတာပါ
        run: |
          cd tl-webview-builder
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Project
        run: |
          cd tl-webview-builder
          npm run build

      - name: Sync Capacitor
        run: |
          cd tl-webview-builder
          npx cap sync android

      - name: Build Android Release
        run: |
          # လမ်းကြောင်း အပြည့်အစုံကို သွားခိုင်းတာပါ
          cd tl-webview-builder/android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease
